apiVersion: 1

groups:
  - orgId: 1
    name: Infrastructure Alerts
    folder: Infrastructure
    interval: 5m

    rules:

      # CPU ALERT
      - uid: cpualert1
        title: CPU Alert
        condition: B

        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              instant: true
              refId: A

          - refId: B
            datasourceUid: "__expr__"
            model:
              expression: A
              type: threshold
              conditions:
                - evaluator:
                    params: [80]
                    type: gt

        for: 5m

        noDataState: OK
        execErrState: Alerting

        annotations:
          summary: CPU usage is above 80%

        labels:
          severity: critical
          category: infrastructure



      # MEMORY ALERT
      - uid: memoryalert1
        title: Memory Usage Alert
        condition: B

        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
              instant: true
              refId: A

          - refId: B
            datasourceUid: "__expr__"
            model:
              expression: A
              type: threshold
              conditions:
                - evaluator:
                    params: [80]
                    type: gt

        for: 5m

        noDataState: OK
        execErrState: Alerting

        annotations:
          summary: Memory usage is above 80%

        labels:
          severity: critical
          category: infrastructure



      # DISK ALERT
      - uid: diskalert1
        title: Disk Usage Alert
        condition: B

        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: 100 - ((node_filesystem_avail_bytes{mountpoint="/"} * 100) / node_filesystem_size_bytes{mountpoint="/"})
              instant: true
              refId: A

          - refId: B
            datasourceUid: "__expr__"
            model:
              expression: A
              type: threshold
              conditions:
                - evaluator:
                    params: [80]
                    type: gt

        for: 5m

        noDataState: OK
        execErrState: Alerting

        annotations:
          summary: Disk usage above 80%

        labels:
          severity: critical
          category: infrastructure