apiVersion: 1

policies:
  - orgId: 1

    receiver: infra-email-alert

    group_by:
      - alertname

    group_wait: 10s
    group_interval: 5m
    repeat_interval: 5m

    routes:
      - receiver: container-email-alert

        group_by:
          - category

        group_wait: 30s
        group_interval: 5m
        repeat_interval: 5m

        matchers:
          - category="container"