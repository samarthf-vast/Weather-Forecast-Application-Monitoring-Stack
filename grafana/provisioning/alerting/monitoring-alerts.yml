apiVersion: 1

groups:
  - orgId: 1
    name: Monitoring Container Alerts
    folder: Monitoring Alerts
    interval: 5m

    rules:

      # =========================================
      # 1. MONITORING CONTAINER CPU ALERT
      # =========================================
      - uid: monitorcpu1
        title: Monitoring Container CPU Alert

        condition: B

        data:
          - refId: A
            datasourceUid: prometheus

            relativeTimeRange:
              from: 300
              to: 0

            model:
              expr: |
                max by (container) (
                  label_replace(
                    (
                      sum by (container_label_com_docker_compose_service) (
                        rate(container_cpu_usage_seconds_total{
                          container_label_app_role="monitoring"
                        }[5m])
                      ) * 100
                    ),
                    "container",
                    "$1",
                    "container_label_com_docker_compose_service",
                    "(.*)"
                  )
                )

              instant: true
              refId: A

          - refId: B
            datasourceUid: "__expr__"

            model:
              expression: A
              type: threshold

              conditions:
                - evaluator:
                    params: [80]
                    type: gt

        for: 5m

        noDataState: OK
        execErrState: Alerting

        annotations:
          summary: >-
            Monitoring container {{ $labels.container }} CPU is at {{ $values.A.Value | printf "%.1f" }}% (threshold: 80%)

        labels:
          severity: critical
          category: monitoring


      # =========================================
      # 2. MONITORING CONTAINER MEMORY ALERT
      # =========================================
      - uid: monitormemory1
        title: Monitoring Container Memory Alert

        condition: B

        data:
          - refId: A
            datasourceUid: prometheus

            relativeTimeRange:
              from: 300
              to: 0

            model:
              expr: |
                max by (container) (
                  label_replace(
                    (
                      (
                        container_memory_usage_bytes{
                          container_label_app_role="monitoring"
                        }
                        /
                        container_spec_memory_limit_bytes{
                          container_label_app_role="monitoring"
                        }
                      ) * 100
                    ),
                    "container",
                    "$1",
                    "container_label_com_docker_compose_service",
                    "(.*)"
                  )
                )

              instant: true
              refId: A

          - refId: B
            datasourceUid: "__expr__"

            model:
              expression: A
              type: threshold

              conditions:
                - evaluator:
                    params: [80]
                    type: gt

        for: 5m

        noDataState: OK
        execErrState: Alerting

        annotations:
          summary: >-
            Monitoring container {{ $labels.container }} memory is at {{ $values.A.Value | printf "%.1f" }}% (threshold: 80%)

        labels:
          severity: critical
          category: monitoring


      # =========================================
      # 3. MONITORING CONTAINER DOWN ALERT
      # (excludes Prometheus — if Prometheus dies it cannot alert itself)
      # =========================================
      - uid: monitordown1
        title: Monitoring Container Down Alert

        condition: B

        data:
          - refId: A
            datasourceUid: prometheus

            relativeTimeRange:
              from: 86400
              to: 0

            model:
              expr: |
                min by (container) (
                  label_replace(
                    (
                      time() - max_over_time(
                        container_last_seen{
                          container_label_app_role="monitoring"
                        }[24h]
                      )
                    ),
                    "container",
                    "$1",
                    "container_label_com_docker_compose_service",
                    "(.*)"
                  )
                )

              instant: true
              refId: A

          - refId: B
            datasourceUid: "__expr__"

            model:
              expression: A
              type: threshold

              conditions:
                - evaluator:
                    params: [120]
                    type: gt

        for: 1m

        noDataState: Alerting
        execErrState: Alerting

        annotations:
          summary: >-
            Monitoring container {{ $labels.container }} is DOWN — not seen for {{ $values.A.Value | printf "%.0f" }} seconds

        labels:
          severity: critical
          category: monitoring
