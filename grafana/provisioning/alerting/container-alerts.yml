apiVersion: 1

groups:

  # GROUP 1 — CPU, Memory, Down (5m interval)

  - orgId: 1
    name: Container Alerts
    folder: Container Alerts
    interval: 5m

    rules:

      # 1. CONTAINER CPU ALERT
      - uid: containercpu1
        title: Container Wise CPU Alert
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: |
                max by (container) (
                  label_replace(
                    (
                      sum by (container_label_com_docker_compose_service) (
                        rate(container_cpu_usage_seconds_total{
                          container_label_app_role="application"
                        }[5m])
                      ) * 100
                    ),
                    "container",
                    "$1",
                    "container_label_com_docker_compose_service",
                    "(.*)"
                  )
                )
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            model:
              expression: A
              type: threshold
              conditions:
                - evaluator:
                    params: [80]
                    type: gt
        for: 5m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: >-
            Container {{ $labels.container }} CPU is at {{ $values.A.Value | printf "%.1f" }}% (threshold: 80%)
        labels:
          severity: critical
          category: container


      # 2. CONTAINER MEMORY ALERT
      - uid: containermemory1
        title: Container Wise Memory Alert
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: |
                max by (container) (
                  label_replace(
                    (
                      (
                        container_memory_usage_bytes{
                          container_label_app_role="application"
                        }
                        /
                        container_spec_memory_limit_bytes{
                          container_label_app_role="application"
                        }
                      ) * 100
                    ),
                    "container",
                    "$1",
                    "container_label_com_docker_compose_service",
                    "(.*)"
                  )
                )
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            model:
              expression: A
              type: threshold
              conditions:
                - evaluator:
                    params: [80]
                    type: gt
        for: 5m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: >-
            Container {{ $labels.container }} memory is at {{ $values.A.Value | printf "%.1f" }}% (threshold: 80%)
        labels:
          severity: critical
          category: container


      # 3. CONTAINER DOWN ALERT
      - uid: containerdown1
        title: Container Down Alert
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 86400
              to: 0
            model:
              expr: |
                min by (container) (
                  label_replace(
                    (
                      time() - max_over_time(
                        container_last_seen{
                          container_label_app_role="application"
                        }[24h]
                      )
                    ),
                    "container",
                    "$1",
                    "container_label_com_docker_compose_service",
                    "(.*)"
                  )
                )
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            model:
              expression: A
              type: threshold
              conditions:
                - evaluator:
                    params: [120]
                    type: gt
        for: 0s
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: >-
            Container {{ $labels.container }} is DOWN — not seen for {{ $values.A.Value | printf "%.0f" }} seconds
        labels:
          severity: critical
          category: container


  # ─────────────────────────────────────────────────────────────────────────
  # GROUP 2 — Container Start (1m interval)
  #
  # Separate group with 1m interval so Grafana evaluates frequently enough
  # to catch the short window after a container restarts.
  #
  # PART 1 — Is container UP right now?
  #   time() - container_last_seen < 90s
  #   With 1m eval, container will be at most 60s old → always caught ✅
  #
  # PART 2 — Was it previously DOWN for 2+ minutes?
  #   max_over_time([2h:1m]) > 120
  #   Looks back 2h, samples every 1m (120 samples)
  #   container_last_seen goes stale after ~5m; the window where values > 120
  #   is only minutes 2–5 after stopping. A 10m window misses it if the
  #   container was down > ~11m. 2h window covers up to ~115m of downtime.
  # ─────────────────────────────────────────────────────────────────────────
  - orgId: 1
    name: Container Start Alerts
    folder: Container Alerts
    interval: 1m

    rules:

      # 4. CONTAINER START ALERT
      - uid: containerstart1
        title: Container Start Alert
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 7200
              to: 0
            model:
              expr: |
                min by (container) (
                  label_replace(
                    time() - container_last_seen{container_label_app_role="application"},
                    "container", "$1",
                    "container_label_com_docker_compose_service", "(.*)"
                  )
                )
                and on(container) (
                  max_over_time(
                    min by (container) (
                      label_replace(
                        time() - container_last_seen{container_label_app_role="application"},
                        "container", "$1",
                        "container_label_com_docker_compose_service", "(.*)"
                      )
                    )[2h:1m]
                  ) > 120
                )
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            model:
              expression: A
              type: threshold
              conditions:
                - evaluator:
                    params: [90]
                    type: lt
        for: 0s
        noDataState: OK
        execErrState: OK
        annotations:
          summary: >-
            Container {{ $labels.container }} is UP and running
        labels:
          severity: info
          category: container-start
