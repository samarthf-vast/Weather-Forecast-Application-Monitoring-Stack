apiVersion: 1

groups:
  - orgId: 1
    name: Container Alerts
    folder: Container Alerts
    interval: 5m

    rules:

      
      # 1. CONTAINER CPU ALERT
      
      - uid: containercpu1
        title: Container Wise CPU Alert

        condition: B

        data:
          - refId: A
            datasourceUid: prometheus

            relativeTimeRange:
              from: 300
              to: 0

            model:
              expr: |
                max by (container) (
                  label_replace(
                    (
                      sum by (container_label_com_docker_compose_service) (
                        rate(container_cpu_usage_seconds_total{
                          container_label_app_role="application"
                        }[5m])
                      ) * 100
                    ),
                    "container",
                    "$1",
                    "container_label_com_docker_compose_service",
                    "(.*)"
                  )
                )

              instant: true
              refId: A

          - refId: B
            datasourceUid: "__expr__"

            model:
              expression: A
              type: threshold

              conditions:
                - evaluator:
                    params: [80]
                    type: gt

        for: 5m

        noDataState: OK
        execErrState: Alerting

        annotations:
          summary: >-
            Container {{ $labels.container }} CPU is at {{ $values.A.Value | printf "%.1f" }}% (threshold: 80%)

        labels:
          severity: critical
          category: container


      
      # 2. CONTAINER MEMORY ALERT
      
      - uid: containermemory1
        title: Container Wise Memory Alert

        condition: B

        data:
          - refId: A
            datasourceUid: prometheus

            relativeTimeRange:
              from: 300
              to: 0

            model:
              expr: |
                max by (container) (
                  label_replace(
                    (
                      (
                        container_memory_usage_bytes{
                          container_label_app_role="application"
                        }
                        /
                        container_spec_memory_limit_bytes{
                          container_label_app_role="application"
                        }
                      ) * 100
                    ),
                    "container",
                    "$1",
                    "container_label_com_docker_compose_service",
                    "(.*)"
                  )
                )

              instant: true
              refId: A

          - refId: B
            datasourceUid: "__expr__"

            model:
              expression: A
              type: threshold

              conditions:
                - evaluator:
                    params: [80]
                    type: gt

        for: 5m

        noDataState: OK
        execErrState: Alerting

        annotations:
          summary: >-
            Container {{ $labels.container }} memory is at {{ $values.A.Value | printf "%.1f" }}% (threshold: 80%)

        labels:
          severity: critical
          category: container


      
      # 3. CONTAINER DOWN ALERT
    
      - uid: containerdown1
        title: Container Down Alert

        condition: B

        data:
          - refId: A
            datasourceUid: prometheus

            relativeTimeRange:
              from: 86400
              to: 0

            model:
              expr: |
                min by (container) (
                  label_replace(
                    (
                      time() - max_over_time(
                        container_last_seen{
                          container_label_app_role="application"
                        }[24h]
                      )
                    ),
                    "container",
                    "$1",
                    "container_label_com_docker_compose_service",
                    "(.*)"
                  )
                )

              instant: true
              refId: A

          - refId: B
            datasourceUid: "__expr__"

            model:
              expression: A
              type: threshold

              conditions:
                - evaluator:
                    params: [120]
                    type: gt

        for: 1m

        noDataState: Alerting
        execErrState: Alerting

        annotations:
          summary: >-
            Container {{ $labels.container }} is DOWN — not seen for {{ $values.A.Value | printf "%.0f" }} seconds

        labels:
          severity: critical
          category: container


      
      # 4. CONTAINER START ALERT
    
      - uid: containerstart1
        title: Container Start Alert

        condition: B

        data:
          - refId: A
            datasourceUid: prometheus

            relativeTimeRange:
              from: 600
              to: 0

            model:
              expr: |
                min by (container) (
                  label_replace(
                    time() - container_last_seen{container_label_app_role="application"},
                    "container", "$1",
                    "container_label_com_docker_compose_service", "(.*)"
                  )
                )
                and on(container) (
                  max_over_time(
                    min by (container) (
                      label_replace(
                        time() - container_last_seen{container_label_app_role="application"},
                        "container", "$1",
                        "container_label_com_docker_compose_service", "(.*)"
                      )
                    )[10m:30s]
                  ) > 120
                )

              instant: true
              refId: A

          - refId: B
            datasourceUid: "__expr__"

            model:
              expression: A
              type: threshold

              conditions:
                - evaluator:
                    params: [30]
                    type: lt

        for: 0s

        noDataState: OK
        execErrState: OK

        annotations:
          summary: >-
            Container {{ $labels.container }} is UP and running

        labels:
          severity: info
          category: container-start


