

services:
  prometheus:
    image: prom/prometheus:v3.5.3
    container_name: prometheus
    ports:
      - "9090:9090"
    mem_limit: 512m
    labels:
      - "app_role=monitoring"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - shared-monitoring

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "3001:3000"
    mem_limit: 512m
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/scripts:/scripts
      - ./grafana/ng_alert_notification.html:/usr/share/grafana/public/emails/ng_alert_notification.html
    networks:
      - shared-monitoring
    entrypoint:
      - /bin/sh
      - -c
      - |
        /run.sh &
        sleep 40
        sh /scripts/grafana-user-setup.sh
        wait

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    ports:
      - "9100:9100"
    mem_limit: 512m
    labels:
      - "app_role=monitoring"
    networks:
      - shared-monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    mem_limit: 512m
    labels:
      - "app_role=monitoring"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - shared-monitoring

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    mem_limit: 512m
    labels:
      - "app_role=monitoring"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml
    networks:
      - shared-monitoring

  # ── DEPRECATED: Promtail replaced by Grafana Alloy 
  # promtail:
  #   image: grafana/promtail:3.0.0
  #   container_name: promtail
  #   user: root
  #   labels:
  #     - "app_role=monitoring"
  #   volumes:
  #     - /var/log:/var/log
  #     - /var/lib/docker/containers:/var/lib/docker/containers:ro
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - ./promtail-config.yml:/etc/promtail/promtail.yml
  #   command: -config.file=/etc/promtail/promtail.yml
  #   mem_limit: 512m
  #   networks:
  #     - shared-monitoring

  alloy:
    image: grafana/alloy:v1.16.1
    container_name: alloy
    user: root
    labels:
      - "app_role=monitoring"
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./alloy-config.alloy:/etc/alloy/config.alloy
    command: run /etc/alloy/config.alloy
    mem_limit: 512m
    networks:
      - shared-monitoring
    

volumes:
  grafana_data:
  prometheus_data:

networks:
  shared-monitoring:
    external: true