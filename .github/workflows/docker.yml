name: MERN Docker CI/CD Project

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      # Login to Docker Hub.............................

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build images.....................................
      - name: Build backend image
        run: docker build -t samarthf45/backend ./backend

      - name: Build frontend image
        run: docker build -t samarthf45/frontend ./frontend

      # Push images on the dockerhub.....................
      - name: Push backend image
        run: docker push samarthf45/backend

      - name: Push frontend image
        run: docker push samarthf45/frontend

      