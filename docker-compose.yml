version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file:
      - .env 
    mem_limit: 512m

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    mem_limit: 512m

  mongo:
    image: mongo:8.2.7 
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    mem_limit: 512m
    volumes:
    - mongo_data:/data/db 

  nginx:
    image: nginx:1.29.8-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    mem_limit: 512m
    depends_on:
      - frontend

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    mem_limit: 512m
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus 
    depends_on:
      - backend
    

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

    # SMTP SETTINGS
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=samarthf@valueaddsofttech.com
      - GF_SMTP_PASSWORD=ndezekpacdyizfkm
      - GF_SMTP_FROM_ADDRESS=samarthf@valueaddsofttech.com
      - GF_SERVER_ROOT_URL=http://grafana.weatherapp.com:3001
      - GF_SERVER_DOMAIN=grafana.weatherapp.com
      - GF_SMTP_FROM_NAME=Grafana
      - GF_SMTP_SKIP_VERIFY=true
    restart: always
    mem_limit: 512m
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards


  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
    mem_limit: 512m

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml                
    mem_limit: 512m

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    user: root   
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/promtail.yml
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock  
      - DOCKER_API_VERSION=1.52                  
    command: -config.file=/etc/promtail/promtail.yml
    mem_limit: 512m
 
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    mem_limit: 512m

volumes:
  mongo_data:
  grafana_data:
  prometheus_data:
  loki_data: