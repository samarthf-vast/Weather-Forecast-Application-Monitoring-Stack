

# version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file:
      - .env
    mem_limit: 512m
    networks:
      - shared-monitoring

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    mem_limit: 512m
    networks:
      - shared-monitoring

  mongo:
    image: mongo:8.2.7
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    mem_limit: 512m
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-monitoring

  nginx:
    image: nginx:1.29.8-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    mem_limit: 512m
    depends_on:
      - frontend
    networks:
      - shared-monitoring

volumes:
  mongo_data:

networks:
  shared-monitoring:
    external: true